<!DOCTYPE html>

<html lang="vi">

<head>

<meta charset="UTF-8">

<title>Giới thiệu</title>

<style>

.container{

    display:flex;

    gap:20px;

    justify-content:center;

}

.card{

    width:180px;

    border:1px solid #ccc;

    padding:10px;

    border-radius:10px;

    text-align:center;

}

button{

    background:#00bfff;

    color:white;

    border:none;

    padding:10px;

    cursor:pointer;

}

#chitiet{

    width:500px;

    margin:30px auto;

    border:2px solid #00bfff;

    padding:20px;

    border-radius:10px;

}

</style>

</head>

<body>

<div class="container">

    <div class="card">

        <h2>Người eo chang hy</h2>

        <p>Ăn rồi ngủ, chụp pi</p>

        <button onclick="hienThi(

        'Người eo chang hy',

        'Ăn rồi ngủ, chụp pi',

        'Sở thích: ngủ'

        )">

        Xem chi tiết

        </button>

    </div>

    <div class="card">

        <h2>Người lùn mà ốm</h2>

        <p>Thích trai đẹp</p>

        <button onclick="hienThi(

        'Người lùn mà ốm',

        'Thích trai đẹp',

        'Sở thích: ngắm trai'

        )">

        Xem chi tiết

        </button>

    </div>

</div>

<div id="chitiet">

    <h2>Thông tin chi tiết</h2>

    <h3 id="ten"></h3>

    <p id="mota"></p>

    <p id="sothich"></p>

</div>

<script>

function hienThi(ten,mota,sothich){

    document.getElementById("ten").innerHTML=ten;

    document.getElementById("mota").innerHTML=mota;

    document.getElementById("sothich").innerHTML=sothich;
    }

</script>

</body>

</html>
